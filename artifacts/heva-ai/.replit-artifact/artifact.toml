kind = "web"
previewPath = "/"
title = "Heva AI"
version = "1.0.0"
id = "artifacts/heva-ai"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21511

[services.development]
run = "pnpm --filter @workspace/heva-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/heva-ai", "run", "build" ]
serve = "static"
publicDir = "artifacts/heva-ai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21511"
BASE_PATH = "/"
